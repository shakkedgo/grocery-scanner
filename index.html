<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רשימת הקניות של משפחתכם</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .checked { text-decoration: line-through; opacity: 0.6; }
        .category-card { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <header class="bg-blue-600 text-white p-6 shadow-lg text-center mb-6">
        <h1 class="text-2xl font-bold">🛒 הרשימה החכמה</h1>
        <p class="text-sm opacity-80">מצלמים, ממיינים וקונים</p>
    </header>

    <main class="max-w-md mx-auto px-4">
        
        <div class="flex justify-center mb-8">
            <label class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-4 rounded-full shadow-xl cursor-pointer flex items-center gap-3 text-lg font-bold transition-transform active:scale-95">
                <span>📸 צלם רשימה</span>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
            </label>
        </div>

        <div id="loader" class="hidden text-center p-5">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-2"></div>
            <p>ה-AI מנתח את הרשימה שלך...</p>
        </div>

        <div id="listContainer" class="space-y-6"></div>
    </main>

    <script>
        // הכנס כאן את ה-API KEY שקיבלת מגוגל
        const GEMINI_API_KEY = 'AQ.Ab8RN6Krqz5JlXqDQQw6MrxaDqg84fMXe9hc9EF-tXvvt8yWhg'; 

        const cameraInput = document.getElementById('cameraInput');
const loader = document.getElementById('loader');
const listContainer = document.getElementById('listContainer');

cameraInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    console.log("📸 קובץ נבחר:", file.name, "גודל:", (file.size / 1024).toFixed(2), "KB");
    showLoading(true);
    
    try {
        const base64Image = await fileToBase64(file);
        const rawData = base64Image.split(',')[1];
        
        console.log("📤 שולח בקשה ל-Gemini...");
        const response = await callGeminiAI(rawData);
        
        console.log("✅ ניתוח הצליח!", response);
        renderList(response);
    } catch (error) {
        console.error("❌ שגיאה בתהליך:", error);
        alert(`שגיאה: ${error.message}`);
    } finally {
        showLoading(false);
    }
});

async function callGeminiAI(base64Data) {
    const prompt = "Analyze this shopping list image. Return a JSON array of objects with 'item' and 'category'. Categorize items logically in Hebrew (e.g., ירקות, מוצרי חלב, ניקיון). Only return the JSON code block.";
    
    // השם המדויק שמצאת ב-CURL
    const modelId = "gemini-2.5-flash"; 
    
    // שימוש ב-v1 היציב
    const url = `https://generativelanguage.googleapis.com/v1/models/${modelId}:generateContent?key=${GEMINI_API_KEY}`;
    
    const response = await fetch(url, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            contents: [{
                parts: [
                    { text: prompt },
                    { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                ]
            }]
        })
    });

    if (!response.ok) {
        const errorBody = await response.json();
        console.error("פרטי שגיאה מהשרת:", errorBody);
        
        // טיפול ייעודי ב-403 (הרשאות)
        if (response.status === 403) {
            throw new Error("שגיאת הרשאה (403). וודא שהמפתח תקין ושה-API מופעל ב-Google Cloud.");
        }
        
        throw new Error(`שגיאה ${response.status}: ${errorBody.error?.message || 'לא נמצא'}`);
    }

    const data = await response.json();
    
    if (!data.candidates || !data.candidates[0]) {
        throw new Error("ה-AI לא הצליח להפיק תשובה. נסה צילום ברור יותר.");
    }

    const textResponse = data.candidates[0].content.parts[0].text;
    
    try {
        // ניקוי Markdown ופיענוח ה-JSON
        const jsonString = textResponse.replace(/```json|```/g, '').trim();
        return JSON.parse(jsonString);
    } catch (e) {
        console.log("תשובה גולמית מה-AI:", textResponse);
        throw new Error("התקבלה תשובה, אך היא לא בפורמט רשימה תקין.");
    }
}

function renderList(data) {
    listContainer.innerHTML = '';
    const categories = {};
    data.forEach(item => {
        if (!categories[item.category]) categories[item.category] = [];
        categories[item.category].push(item.item);
    });

    for (const [cat, items] of Object.entries(categories)) {
        const card = document.createElement('div');
        card.className = 'category-card bg-white rounded-xl shadow-md p-4 border-r-4 border-blue-500 mb-4';
        
        let itemsHtml = items.map(item => `
            <div class="flex items-center gap-3 py-2 border-b border-gray-50 last:border-0" onclick="const cb = this.querySelector('input'); cb.checked = !cb.checked; this.classList.toggle('checked')">
                <input type="checkbox" class="w-5 h-5 rounded border-gray-300">
                <span class="text-lg text-gray-800">${item}</span>
            </div>
        `).join('');

        card.innerHTML = `
            <h3 class="font-bold text-blue-700 mb-3 text-xl border-b-2 border-blue-100 pb-1">${cat}</h3>
            <div class="space-y-1">${itemsHtml}</div>
        `;
        listContainer.appendChild(card);
    }
}

function fileToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

function showLoading(isLoading) {
    loader.classList.toggle('hidden', !isLoading);
    listContainer.classList.toggle('hidden', isLoading);
}
    </script>
</body>
</html>
